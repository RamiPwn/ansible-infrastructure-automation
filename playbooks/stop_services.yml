- hosts: debian
  become: yes
  gather_facts: no

  tasks:
    - name: "Arret des services (silencieux)"
      # On utilise systemctl stop. Le '|| true' garantit que le playbook ne s'arrete jamais.
      shell: "systemctl stop {{ item }} 2>/dev/null || true"
      loop:
        - apache2
        - mariadb
        - proftpd
      changed_when: false

    - name: "Status final"
      debug:
        msg: "Les services sur {{ inventory_hostname }} ont ete stoppes."
